name: Build Executables

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # allows manual trigger from the GitHub website

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            name: EHDN_PubMed_Parser_Windows
            output: dist/EHDN_PubMed_Parser.exe
          - os: macos-latest
            name: EHDN_PubMed_Parser_Mac
            output: dist/EHDN_PubMed_Parser

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller pandas openpyxl python-docx

      - name: Build executable
        run: |
          pyinstaller --noconfirm --onefile --windowed --name "EHDN_PubMed_Parser" main.py

      - name: Upload executable as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.output }}
          retention-days: 30
